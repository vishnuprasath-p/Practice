name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            if command -v kubectl &> /dev/null; then
              kubectl set image deployment/simple-ui-app \
                simple-ui-app=${{ secrets.DOCKER_USERNAME }}/simple-ui-app:${{ github.event.inputs.image_tag }}
              kubectl rollout status deployment/simple-ui-app
            else
              echo "kubectl not found on the VM"
              exit 1
            fi
