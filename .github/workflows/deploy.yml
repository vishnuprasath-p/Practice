name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (commit SHA) to deploy'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract last 5 digits of commit SHA
        id: short_sha
        run: echo "sha_short=$(echo ${{ github.event.inputs.image_tag }} | tail -c 6)" >> $GITHUB_OUTPUT

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            if command -v kubectl &> /dev/null; then
              cd /home/${{ secrets.VM_USER }}/Practice
              git pull origin main
              
              # Replace placeholders in deployment manifest
              sed -i 's|DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g' k8s/deployment.yml
              sed -i 's|BUILD_COMMIT_ID|${{ steps.short_sha.outputs.sha_short }}|g' k8s/deployment.yml
              
              # Apply deployment
              kubectl apply -f k8s/deployment.yml
              kubectl rollout status deployment/simple-ui-app --timeout=5m
              echo "Deployment successful with image tag: ${{ steps.short_sha.outputs.sha_short }}"
            else
              echo "kubectl not found on the VM"
              exit 1
            fi
