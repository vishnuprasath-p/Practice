name: CI-CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build and Push to Docker Hub on GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /home/${{ secrets.VM_USER }}/simple-ui-app || mkdir -p /home/${{ secrets.VM_USER }}/simple-ui-app && cd /home/${{ secrets.VM_USER }}/simple-ui-app

            # Clone or pull the latest code from GitHub
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/vishnuprasath-p/Practice.git .
            fi

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Build Docker image on the VM
            sudo docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-ui-app:latest .

            # Push image to Docker Hub
            sudo docker push ${{ secrets.DOCKER_USERNAME }}/simple-ui-app:latest

            # Logout from Docker Hub
            sudo docker logout

            echo "Docker image successfully built and pushed to Docker Hub!"
