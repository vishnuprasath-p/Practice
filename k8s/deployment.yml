apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-ui-app
  labels:
    app: simple-ui-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-ui-app
  template:
    metadata:
      labels:
        app: simple-ui-app
    spec:
      containers:
      - name: simple-ui-app
        image: DOCKER_USERNAME/simple-ui-app:BUILD_COMMIT_ID
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simple-ui-app
  labels:
    app: simple-ui-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: simple-ui-app
